name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build the Docker image
      id: build
      run: docker build . --file Dockerfile --tag sprint-planner:latest

    - name: Tag the Docker image with timestamp
      id: tag
      run: |
        TIMESTAMP=$(date +%s)
        docker tag sprint-planner:latest emcpheron/sprint-planner:$TIMESTAMP
        docker tag sprint-planner:latest emcpheron/sprint-planner:latest
        echo "::set-output name=timestamp::$TIMESTAMP"

    - name: Push the Docker image to Docker Hub
      run: |
        docker push emcpheron/sprint-planner:latest
        docker push emcpheron/sprint-planner:${{ steps.tag.outputs.timestamp }}
