name: Automated Release

on:
  push:
    branches:
      - main

jobs:
  tag_and_release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Get current version from package.json
      id: get_version
      run: |
        current_version=$(jq -r '.version' package.json)
        echo "current_version=${current_version}" >> $GITHUB_ENV

    - name: Increment version
      id: increment_version
      run: |
        current_version=${{ env.current_version }}
        IFS='.' read -r -a version_parts <<< "$current_version"
        major=${version_parts[0]}
        minor=${version_parts[1]}
        patch=${version_parts[2]}
        new_patch=$((patch + 1))
        new_version="$major.$minor.$new_patch"
        echo "new_version=${new_version}" >> $GITHUB_ENV

    - name: Update package.json version
      run: |
        jq ".version = \"${{ env.new_version }}\"" package.json > package.json.tmp
        mv package.json.tmp package.json

    - name: Commit version bump
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git checkout -b version-bump-${{ env.new_version }}
        git add package.json
        git commit -m "chore: bump version to ${{ env.new_version }}"
        git push origin version-bump-${{ env.new_version }}

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore: bump version to ${{ env.new_version }}"
        branch: version-bump-${{ env.new_version }}
        base: main
        title: "Version Bump to ${{ env.new_version }}"
        body: "Bumps the version to ${{ env.new_version }}."

  create_release:
    needs: tag_and_release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Get current version from package.json
      id: get_version
      run: |
        current_version=$(jq -r '.version' package.json)
        echo "current_version=${current_version}" >> $GITHUB_ENV

    - name: Create new tag
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        new_version=${{ env.current_version }}
        git tag $new_version
        git push origin $new_version

    - name: Install GitHub CLI
      run: sudo apt-get install gh

    - name: Create GitHub release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        new_version=${{ env.current_version }}
        gh release create $new_version --title "Release $new_version" --notes "Release notes for version $new_version"
