name: Automated Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Update Version
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.PAT }}
          git-message: 'chore(release): {version}'
