name: Automated Release

on:
  push:
    branches:
      - main

jobs:
  tag_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get the current version
        id: get_version
        run: echo "::set-output name=current_version::$(git describe --tags --abbrev=0 || echo '0.0.0')"

      - name: Increment version
        id: increment_version
        run: |
          current_version=${{ steps.get_version.outputs.current_version }}
          IFS='.' read -r -a version_parts <<< "$current_version"
          major=${version_parts[0]}
          minor=${version_parts[1]}
          patch=${version_parts[2]}
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch"
          echo "::set-output name=new_version::$new_version"

      - name: Create new tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          new_version=${{ steps.increment_version.outputs.new_version }}
          git tag $new_version
          git push origin $new_version

      - name: Create GitHub release
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const new_version = '${{ steps.increment_version.outputs.new_version }}';
            const response = await github.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: new_version,
              name: new_version,
              body: `Release ${new_version}`,
              draft: false,
              prerelease: false
            });
            console.log(response.data);
